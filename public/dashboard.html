<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Provider Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <h1 id="dashboardTitle">Dashboard</h1>
        <p>OAuth connection status.</p>
      </header>

      <section class="panel">
        <h2>Connection</h2>
        <div class="form-grid">
          <div>
            <span id="statusPill" class="status-pill disconnected">Disconnected</span>
          </div>
        </div>
        <button id="disconnectBtn" class="secondary">Logout</button>
      </section>

      <section class="panel">
        <h2>Repository</h2>
        <label>
          Repo Selector
          <select id="repoSelect">
            <option value="">Select repository</option>
          </select>
        </label>
      </section>

      <section id="complianceSection" class="panel" hidden>
        <h2>Compliance</h2>
        <label>
          Compliance Selector
          <select id="complianceSelect">
            <option value="">Select compliance</option>
            <option value="iso27001">ISO 27001</option>
            <option value="soc2">SOC 2</option>
          </select>
        </label>
        <button id="runComplianceTestBtn">Run Compliance Test</button>
      </section>

      <section id="resultSection" class="panel" hidden>
        <h2>Test Result</h2>
        <pre id="resultBox">No result yet.</pre>
      </section>
    </main>
    <script type="module" src="/dashboard.js"></script>
  </body>
</html>
